version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vehicle_inspection_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vehicle_inspection_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vehicle_network

  redis:
    image: redis:7-alpine
    container_name: vehicle_inspection_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vehicle_network

  adminer:
    image: adminer:latest
    container_name: vehicle_inspection_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - vehicle_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: vehicle_inspection_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - vehicle_network

volumes:
  postgres_data:
  redis_data:

networks:
  vehicle_network:
    driver: bridge
